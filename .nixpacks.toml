# Nixpacks config para Railway — fuerza Node 20 y que no dependa del detector.
# El buildCommand y startCommand reales se definen en railway.json.

[phases.setup]
nixPkgs = ["nodejs_20", "npm-10_x"]

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npx serve -s dist -l tcp://0.0.0.0:$PORT"
